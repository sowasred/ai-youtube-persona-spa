name: Daily Blog PR

on:
  schedule:
    # GitHub Actions cron uses UTC. 11:00 UTC matches 6:00 AM EST
    # and 7:00 AM EDT during daylight saving time.
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-blog-post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate blog post
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BLOG_MODEL: ${{ vars.OPENAI_BLOG_MODEL || 'gpt-5-mini' }}
        run: node scripts/generate-blog-post.mjs

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automation/daily-blog-post
          commit-message: 'chore: add generated ReplyFan blog post'
          title: 'chore: add generated ReplyFan blog post'
          body: |
            ## Summary
            - generate one new concise ReplyFan blog post
            - add the post to `content/blog/posts.json`
            - keep blog publishing on a daily automation path
          delete-branch: true
          labels: content, automation
